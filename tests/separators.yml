name: Path Separators

tests:
  # glob[pattern.separator.no-windows-slashes]
  - name: no-windows-separators
    globs:
      - "src\\index.js"
    paths:
      - "src/foo/index.js"
      - "src\\foo\\index.js"
      - "C:/dev/src/index.js"
      - "C:\\dev\\src\\index.js"
    # requires one of `error` or `match` to be defined
    error: EWINSEP # or a message, or just `true`
    match: false
